name: Build and audit RoleForge campaign

on:
  pull_request:
    branches: [main]
    paths:
      - '.roleforge/pr-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-audit-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply chunked audited source package
        run: |
          python - <<'PY'
          import base64, hashlib, io, tarfile
          from pathlib import Path
          parts = sorted(Path('.roleforge/source-parts').glob('part-*.b64'))
          if not parts:
              raise SystemExit('No source package parts found')
          encoded = ''.join(''.join(p.read_text().split()) for p in parts)
          archive = base64.b64decode(encoded, validate=True)
          expected = Path('.roleforge/source-parts/sha256.txt').read_text().strip()
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected:
              raise SystemExit(f'Source package SHA mismatch: expected {expected}, got {actual}')
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              bundle.extractall('.')
          print(f'Applied {len(parts)} parts, {len(archive)} bytes, sha256 {actual}')
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF and browser-audit dependencies
        run: |
          pip install 'weasyprint==68.0' 'pypdf==5.9.0' 'playwright==1.55.0' 'beautifulsoup4==4.13.4' 'pillow==11.3.0'
          python -m playwright install --with-deps chromium

      - name: Generate and verify branded PDFs
        run: python scripts/build_pdfs.py

      - name: Run responsive, brand, interaction and reduced-motion audit
        run: python scripts/render_audit.py

      - name: Verify committed manifest sources
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('artifact-manifest.json').read_text())
          files = []
          for value in manifest.values():
              if isinstance(value, list):
                  files.extend(value)
          missing = [p for p in files if not Path(p).exists() or Path(p).stat().st_size == 0]
          if missing:
              raise SystemExit('Missing or empty manifest entries: ' + ', '.join(missing))
          print(f'Verified {len(files)} manifest entries.')
          PY

      - name: Mark campaign complete after audit
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          metadata_path = Path('campaign-metadata.json')
          metadata = json.loads(metadata_path.read_text())
          metadata['campaign_state'] = 'complete'
          metadata['audit_workflow_run_id'] = os.environ['GITHUB_RUN_ID']
          metadata_path.write_text(json.dumps(metadata, indent=2) + '\n')
          audit_path = Path('audit/latest-run.json')
          audit = json.loads(audit_path.read_text())
          audit['workflow_run_id'] = os.environ['GITHUB_RUN_ID']
          audit['audited_branch'] = 'main'
          audit_path.write_text(json.dumps(audit, indent=2) + '\n')
          PY

      - name: Upload complete audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: 3cloud-campaign-brand-completion-audit
          path: audit/
          if-no-files-found: error

      - name: Commit audited campaign to main
        run: |
          rm -rf .roleforge/source-parts
          rm -f .roleforge/campaign-source.tar.gz.b64 .roleforge/apply-trigger.txt .roleforge/last-bundle-error.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete 3Cloud Brand Fidelity and campaign audit [skip ci]'
          git push
